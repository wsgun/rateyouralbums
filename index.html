<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rate Your Albums">
<meta name="theme-color" content="#0a0a0a">
<title>Rate Your Albums</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><circle cx='16' cy='16' r='10' fill='none' stroke='%23e8ff47' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='%23e8ff47'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0f0f0; --muted: #666;
    --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.12);
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; overflow-x: hidden; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px; display: flex; align-items: center; height: 56px;
  }
  .logo { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); }
  .logo span { color: var(--text); }

  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 56px; z-index: 99;
  }
  .tab {
    flex: 1; padding: 14px 0; text-align: center;
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); cursor: pointer; border: none; background: none;
    transition: color 0.2s; position: relative;
  }
  .tab.active { color: var(--accent); }
  .tab.active::after {
    content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
    height: 2px; background: var(--accent); border-radius: 2px;
  }

  .view { display: none; padding: 0 0 100px; }
  .view.active { display: block; }

  .search-wrap { padding: 16px; }
  .search-box { display: flex; gap: 8px; }
  .search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px; color: var(--text);
    font-family: var(--font-display); font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .search-btn {
    background: var(--accent); color: #000; border: none; border-radius: 10px;
    padding: 12px 18px; font-family: var(--font-display); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .search-btn:active { opacity: 0.8; }

  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 16px; }
  .album-card {
    background: var(--surface); border-radius: 12px; overflow: hidden;
    cursor: pointer; border: 1px solid var(--border);
    transition: transform 0.15s, border-color 0.15s; position: relative;
  }
  .album-card:active { transform: scale(0.97); }
  .album-card.rated { border-color: var(--accent); }
  .album-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: var(--surface2); }
  .album-cover-placeholder {
    width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
    background: var(--surface2); font-size: 32px; opacity: 0.3;
  }
  .album-info { padding: 10px 10px 12px; }
  .album-title { font-size: 12px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .album-artist { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rating-badge {
    position: absolute; top: 8px; right: 8px;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px; font-weight: 500; border: 1.5px solid;
  }

  .score-s { border-color: #e8ff47; color: #e8ff47; background: rgba(232,255,71,0.15); }
  .score-a { border-color: #47d4ff; color: #47d4ff; background: rgba(71,212,255,0.15); }
  .score-b { border-color: #47ff9c; color: #47ff9c; background: rgba(71,255,156,0.15); }
  .score-c { border-color: #ffaa47; color: #ffaa47; background: rgba(255,170,71,0.15); }
  .score-d { border-color: #ff6b47; color: #ff6b47; background: rgba(255,107,71,0.15); }
  .score-f { border-color: #ff4747; color: #ff4747; background: rgba(255,71,71,0.15); }
  .score-perfect { border-color: #fff; color: #fff; background: rgba(255,255,255,0.2); box-shadow: 0 0 8px rgba(232,255,71,0.6); }

  .score-bar-wrap { padding: 0 16px 20px; }
  .score-bar-track { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s; }

  .ratings-list { padding: 0 16px; }
  .rating-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .rating-row:last-child { border-bottom: none; }
  .rating-row-cover { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .rating-row-info { flex: 1; min-width: 0; }
  .rating-row-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rating-row-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rating-row-score { font-family: var(--font-mono); font-size: 20px; font-weight: 500; flex-shrink: 0; width: 40px; text-align: right; }

  .section-header { padding: 20px 16px 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  .empty { text-align: center; padding: 60px 32px; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    display: none; align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 100%; background: var(--surface); border-radius: 24px 24px 0 0;
    padding: 0 0 40px; max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 0;
  }
  .modal-close-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.2s;
  }
  .modal-close-btn:active { background: var(--border); }

  .modal-cover-wrap { position: relative; }
  .modal-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; max-height: 260px; }
  .modal-cover-placeholder { width: 100%; aspect-ratio: 1/1; max-height: 260px; display: flex; align-items: center; justify-content: center; background: var(--surface2); font-size: 64px; opacity: 0.2; }
  .modal-cover-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 100px; background: linear-gradient(transparent, var(--surface)); }
  .modal-body { padding: 0 20px; }
  .modal-title { font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
  .modal-artist { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

  .score-display { text-align: center; margin-bottom: 8px; position: relative; }
  .score-number { font-family: var(--font-mono); font-size: 64px; font-weight: 500; line-height: 1; transition: color 0.3s; }
  .score-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; font-weight: 600; transition: color 0.3s; }

  /* 100 PERFECT EFFECT */
  .perfect-glow { animation: perfectPulse 1.5s ease-in-out infinite; }
  @keyframes perfectPulse {
    0%, 100% { text-shadow: 0 0 20px rgba(232,255,71,0.8), 0 0 40px rgba(232,255,71,0.4); }
    50% { text-shadow: 0 0 40px rgba(232,255,71,1), 0 0 80px rgba(232,255,71,0.6), 0 0 120px rgba(232,255,71,0.3); }
  }
  .perfect-stars {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    font-size: 14px; letter-spacing: 4px; opacity: 0;
    transition: opacity 0.3s;
  }
  .perfect-stars.show { opacity: 1; }

  .slider-wrap { margin: 16px 0 20px; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: var(--surface2); border-radius: 6px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 0 4px rgba(232,255,71,0.2); }
  .slider-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* TRACKLIST */
  .tracklist-wrap { margin-bottom: 20px; }
  .tracklist-header { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .tracklist { background: var(--surface2); border-radius: 12px; overflow: hidden; }
  .track-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .track-row:last-child { border-bottom: none; }
  .track-num { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 18px; flex-shrink: 0; text-align: right; }
  .track-name { font-size: 13px; flex: 1; }
  .track-duration { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .tracklist-loading { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }

  .comment-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; color: var(--text);
    font-family: var(--font-display); font-size: 14px; line-height: 1.6;
    outline: none; resize: none; height: 90px; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .save-btn {
    width: 100%; padding: 16px; margin-top: 16px;
    background: var(--accent); color: #000; border: none; border-radius: 14px;
    font-family: var(--font-display); font-size: 15px; font-weight: 800;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .save-btn:active { transform: scale(0.98); }
  .delete-btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: transparent; color: #ff4747; border: 1px solid rgba(255,71,71,0.3);
    border-radius: 14px; font-family: var(--font-display); font-size: 14px; font-weight: 600;
    cursor: pointer;
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .stat-val { font-family: var(--font-mono); font-size: 28px; font-weight: 500; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }

  .dist-wrap { padding: 0 16px 24px; }
  .dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dist-label { font-family: var(--font-mono); font-size: 12px; color: var(--muted); width: 50px; flex-shrink: 0; }
  .dist-bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .dist-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .dist-count { font-family: var(--font-mono); font-size: 12px; color: var(--muted); width: 20px; text-align: right; }

  .spinner { display: flex; justify-content: center; padding: 40px; }
  .spin { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sort-wrap { display: flex; gap: 6px; padding: 0 16px 16px; overflow-x: auto; scrollbar-width: none; }
  .sort-wrap::-webkit-scrollbar { display: none; }
  .sort-btn {
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: var(--font-display); font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .sort-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  /* SCORE BAR PERFECT */
  .bar-perfect { background: linear-gradient(90deg, #e8ff47, #fff) !important; }
</style>
</head>
<body>

<header>
  <div class="logo">RATE<span>YOUR</span>ALBUMS</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('search', this)">Search</button>
  <button class="tab" onclick="switchTab('ratings', this)">My Ratings</button>
  <button class="tab" onclick="switchTab('stats', this)">Stats</button>
</div>

<div class="view active" id="view-search">
  <div class="search-wrap">
    <div class="search-box">
      <input class="search-input" id="searchInput" type="text" placeholder="앨범 또는 아티스트 검색..." autocomplete="off">
      <button class="search-btn" onclick="doSearch()">검색</button>
    </div>
  </div>
  <div id="searchResults"></div>
</div>

<div class="view" id="view-ratings">
  <div class="sort-wrap">
    <button class="sort-btn active" onclick="setSort('date', this)">최근 순</button>
    <button class="sort-btn" onclick="setSort('score-desc', this)">높은 점수</button>
    <button class="sort-btn" onclick="setSort('score-asc', this)">낮은 점수</button>
    <button class="sort-btn" onclick="setSort('alpha', this)">알파벳 순</button>
  </div>
  <div id="myRatingsList"></div>
</div>

<div class="view" id="view-stats">
  <div id="statsContent"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-top-bar">
      <div style="width:32px"></div>
      <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto"></div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-cover-wrap" id="modalCoverWrap"></div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-artist" id="modalArtist"></div>

      <div class="score-display">
        <div class="perfect-stars" id="perfectStars">✦ ✦ ✦</div>
        <div class="score-number" id="scoreDisplay">50</div>
        <div class="score-label" id="gradeDisplay">D — MEDIOCRE</div>
      </div>

      <div style="padding:0 0 16px">
        <div class="score-bar-track">
          <div class="score-bar-fill" id="scoreBarFill" style="width:50%"></div>
        </div>
      </div>

      <div class="slider-wrap">
        <input type="range" id="scoreSlider" min="0" max="100" value="50" oninput="updateScore(this.value)">
        <div class="slider-labels"><span>0</span><span>50</span><span>100</span></div>
      </div>

      <div class="tracklist-wrap">
        <div class="tracklist-header">수록곡</div>
        <div class="tracklist" id="tracklistEl">
          <div class="tracklist-loading">앨범을 클릭하면 수록곡이 로드됩니다</div>
        </div>
      </div>

      <div class="comment-label">코멘트</div>
      <textarea id="commentInput" placeholder="이 앨범에 대한 생각을 남겨보세요..."></textarea>
      <button class="save-btn" onclick="saveRating()">저장하기</button>
      <button class="delete-btn" id="deleteBtn" style="display:none" onclick="deleteRating()">삭제하기</button>
    </div>
  </div>
</div>

<script>
const LASTFM_KEY = 'e8c18f3eac290af9a7bda25d563df9f0';
let currentAlbum = null;
let currentSort = 'date';
let ratings = JSON.parse(localStorage.getItem('ryaRatings') || '{}');

function scoreGrade(n) {
  n = parseInt(n);
  if (n === 100) return { label: '✦ PERFECT ✦', cls: 'score-perfect', color: '#ffffff' };
  if (n >= 90)  return { label: 'S — MASTERPIECE', cls: 'score-s', color: '#e8ff47' };
  if (n >= 80)  return { label: 'A — GREAT', cls: 'score-a', color: '#47d4ff' };
  if (n >= 70)  return { label: 'B — GOOD', cls: 'score-b', color: '#47ff9c' };
  if (n >= 60)  return { label: 'C — DECENT', cls: 'score-c', color: '#ffaa47' };
  if (n >= 50)  return { label: 'D — MEDIOCRE', cls: 'score-d', color: '#ff6b47' };
  return { label: 'F — BAD', cls: 'score-f', color: '#ff4747' };
}

function saveRatings() { localStorage.setItem('ryaRatings', JSON.stringify(ratings)); }

function getBigCover(images) {
  if (!images) return null;
  const order = ['extralarge', 'large', 'medium', 'small'];
  for (const size of order) {
    const img = images.find(i => i.size === size);
    if (img && img['#text'] && img['#text'] !== '') return img['#text'];
  }
  return null;
}

function dedupe(albums) {
  const seen = new Set();
  return albums.filter(a => {
    const key = `${a.artist.toLowerCase().trim()}__${a.name.toLowerCase().trim()}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function msToTime(ms) {
  if (!ms) return '';
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const el = document.getElementById('searchResults');
  el.innerHTML = '<div class="spinner"><div class="spin"></div></div>';
  try {
    const url = `https://ws.audioscrobbler.com/2.0/?method=album.search&album=${encodeURIComponent(q)}&api_key=${LASTFM_KEY}&format=json&limit=50`;
    const r = await fetch(url);
    const d = await r.json();
    const raw = d.results?.albummatches?.album || [];
    const albums = dedupe(raw);
    renderGrid(albums, el);
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚠</div>검색 중 오류가 발생했어요</div>';
  }
}

function albumKey(album) {
  return `${album.artist}__${album.name}`;
}

function renderGrid(albums, container) {
  if (!albums.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">◎</div>검색 결과가 없어요</div>';
    return;
  }
  container.innerHTML = '<div class="section-header">검색 결과 ' + albums.length + '개</div>' +
    '<div class="results-grid">' +
    albums.map(a => {
      const cover = getBigCover(a.image);
      const key = albumKey(a);
      const myRating = ratings[key];
      const badge = myRating ? `<div class="rating-badge ${scoreGrade(myRating.score).cls}">${myRating.score}</div>` : '';
      const safe = encodeURIComponent(JSON.stringify(a));
      const coverHtml = cover
        ? `<img class="album-cover" src="${cover}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'album-cover-placeholder\\'>♪</div>'">`
        : `<div class="album-cover-placeholder">♪</div>`;
      return `<div class="album-card ${myRating?'rated':''}" onclick="openModalEncoded('${safe}')">
        ${coverHtml}${badge}
        <div class="album-info">
          <div class="album-title">${a.name}</div>
          <div class="album-artist">${a.artist}</div>
        </div>
      </div>`;
    }).join('') + '</div>';
}

function openModalEncoded(enc) { openModal(JSON.parse(decodeURIComponent(enc))); }

async function openModal(album) {
  currentAlbum = album;
  const key = albumKey(album);
  const ex = ratings[key];
  const score = ex ? ex.score : 50;
  const cover = getBigCover(album.image);

  const coverWrap = document.getElementById('modalCoverWrap');
  if (cover) {
    coverWrap.innerHTML = `<img class="modal-cover" src="${cover}" alt=""><div class="modal-cover-gradient"></div>`;
  } else {
    coverWrap.innerHTML = `<div class="modal-cover-placeholder">♪</div><div class="modal-cover-gradient"></div>`;
  }

  document.getElementById('modalTitle').textContent = album.name;
  document.getElementById('modalArtist').textContent = album.artist;
  document.getElementById('scoreSlider').value = score;
  document.getElementById('commentInput').value = ex?.comment || '';
  document.getElementById('deleteBtn').style.display = ex ? 'block' : 'none';
  updateScore(score);

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Load tracklist
  loadTracklist(album.artist, album.name);
}

async function loadTracklist(artist, album) {
  const el = document.getElementById('tracklistEl');
  el.innerHTML = '<div class="tracklist-loading">불러오는 중...</div>';
  try {
    const url = `https://ws.audioscrobbler.com/2.0/?method=album.getinfo&api_key=${LASTFM_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(album)}&format=json`;
    const r = await fetch(url);
    const d = await r.json();
    const tracks = d.album?.tracks?.track;
    if (!tracks || (Array.isArray(tracks) && tracks.length === 0)) {
      el.innerHTML = '<div class="tracklist-loading">수록곡 정보 없음</div>';
      return;
    }
    const list = Array.isArray(tracks) ? tracks : [tracks];
    el.innerHTML = list.map((t, i) => `
      <div class="track-row">
        <div class="track-num">${i+1}</div>
        <div class="track-name">${t.name}</div>
        <div class="track-duration">${msToTime(t.duration * 1000)}</div>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = '<div class="tracklist-loading">수록곡 정보 없음</div>';
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function updateScore(val) {
  val = parseInt(val);
  const g = scoreGrade(val);
  const scoreEl = document.getElementById('scoreDisplay');
  const labelEl = document.getElementById('gradeDisplay');
  const barEl = document.getElementById('scoreBarFill');
  const starsEl = document.getElementById('perfectStars');

  scoreEl.textContent = val;
  scoreEl.style.color = g.color;
  labelEl.textContent = g.label;
  labelEl.style.color = g.color;
  barEl.style.width = val + '%';

  if (val === 100) {
    barEl.style.background = 'linear-gradient(90deg, #e8ff47, #ffffff)';
    scoreEl.classList.add('perfect-glow');
    starsEl.classList.add('show');
  } else {
    barEl.style.background = g.color;
    scoreEl.classList.remove('perfect-glow');
    starsEl.classList.remove('show');
  }
}

function saveRating() {
  if (!currentAlbum) return;
  const key = albumKey(currentAlbum);
  const cover = getBigCover(currentAlbum.image);
  ratings[key] = {
    score: parseInt(document.getElementById('scoreSlider').value),
    comment: document.getElementById('commentInput').value.trim(),
    album: { key, name: currentAlbum.name, artist: currentAlbum.artist, cover },
    savedAt: Date.now()
  };
  saveRatings();
  closeModal();
  renderMyRatings(); renderStats();
}

function deleteRating() {
  if (!currentAlbum) return;
  delete ratings[albumKey(currentAlbum)];
  saveRatings();
  closeModal();
  renderMyRatings(); renderStats();
}

function setSort(s, btn) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMyRatings();
}

function renderMyRatings() {
  const el = document.getElementById('myRatingsList');
  let items = Object.values(ratings);
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">♫</div>아직 레이팅한 앨범이 없어요.<br>검색 탭에서 앨범을 찾아보세요!</div>';
    return;
  }
  if (currentSort === 'date') items.sort((a,b) => b.savedAt - a.savedAt);
  else if (currentSort === 'score-desc') items.sort((a,b) => b.score - a.score);
  else if (currentSort === 'score-asc') items.sort((a,b) => a.score - b.score);
  else items.sort((a,b) => a.album.name.localeCompare(b.album.name));
  el.innerHTML = '<div class="section-header">' + items.length + '개의 레이팅</div><div class="ratings-list">' +
    items.map(r => {
      const g = scoreGrade(r.score);
      const safe = encodeURIComponent(JSON.stringify({
        name: r.album.name, artist: r.album.artist,
        image: r.album.cover ? [{'#text':'','size':'small'},{'#text':'','size':'medium'},{'#text':'','size':'large'},{'#text':r.album.cover,'size':'extralarge'}] : []
      }));
      const coverHtml = r.album.cover
        ? `<img class="rating-row-cover" src="${r.album.cover}" alt="">`
        : `<div class="rating-row-cover" style="display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0.3">♪</div>`;
      return `<div class="rating-row" onclick="openModalEncoded('${safe}')">
        ${coverHtml}
        <div class="rating-row-info">
          <div class="rating-row-title">${r.album.name}</div>
          <div class="rating-row-artist">${r.album.artist}</div>
        </div>
        <div class="rating-row-score" style="color:${g.color}">${r.score}</div>
      </div>`;
    }).join('') + '</div>';
}

function renderStats() {
  const el = document.getElementById('statsContent');
  const items = Object.values(ratings);
  if (!items.length) {
    el.innerHTML = '<div class="empty" style="padding-top:80px"><div class="empty-icon">◈</div>레이팅이 없어요.<br>앨범을 레이팅하면 통계가 보여요!</div>';
    return;
  }
  const avg = Math.round(items.reduce((s,r) => s+r.score, 0) / items.length);
  const best = items.reduce((a,b) => a.score > b.score ? a : b);
  const worst = items.reduce((a,b) => a.score < b.score ? a : b);
  const bands = [
    ['100', r => r.score === 100],
    ['90-99', r => r.score >= 90 && r.score < 100],
    ['80-89', r => r.score >= 80 && r.score < 90],
    ['70-79', r => r.score >= 70 && r.score < 80],
    ['60-69', r => r.score >= 60 && r.score < 70],
    ['50-59', r => r.score >= 50 && r.score < 60],
    ['0-49',  r => r.score < 50],
  ];
  const colors = ['#ffffff','#e8ff47','#47d4ff','#47ff9c','#ffaa47','#ff6b47','#ff4747'];
  const counts = bands.map(([,f]) => items.filter(f).length);
  const max = Math.max(...counts, 1);

  el.innerHTML = `
    <div class="section-header">총 통계</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${items.length}</div><div class="stat-label">레이팅한 앨범</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${scoreGrade(avg).color}">${avg}</div><div class="stat-label">평균 점수</div></div>
    </div>
    <div class="section-header">최고 & 최저</div>
    <div style="padding:0 16px 20px;display:flex;flex-direction:column;gap:10px">
      ${[['최고',best],['최저',worst]].map(([label,r]) => `
      <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:14px;border:1px solid var(--border)">
        ${r.album.cover
          ? `<img style="width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0" src="${r.album.cover}" alt="">`
          : `<div style="width:52px;height:52px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0.3;flex-shrink:0">♪</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">${label}</div>
          <div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.album.name}</div>
          <div style="font-size:12px;color:var(--muted)">${r.album.artist}</div>
        </div>
        <div style="font-family:var(--font-mono);font-size:20px;color:${scoreGrade(r.score).color};flex-shrink:0">${r.score}</div>
      </div>`).join('')}
    </div>
    <div class="section-header">점수 분포</div>
    <div class="dist-wrap">
      ${bands.map(([label],i) => `
      <div class="dist-row">
        <div class="dist-label">${label}</div>
        <div class="dist-bar-track"><div class="dist-bar-fill" style="width:${counts[i]/max*100}%;background:${colors[i]}"></div></div>
        <div class="dist-count">${counts[i]}</div>
      </div>`).join('')}
    </div>`;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'ratings') renderMyRatings();
  if (tab === 'stats') renderStats();
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
