<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rate Your Albums">
<meta name="theme-color" content="#0a0a0a">
<title>Rate Your Albums</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><circle cx='16' cy='16' r='10' fill='none' stroke='%23e8ff47' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='%23e8ff47'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #f0f0f0; --muted: #666;
    --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.12);
    --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
    --grid-cols: 2;
  }
  @media (min-width: 600px)  { :root { --grid-cols: 3; } }
  @media (min-width: 900px)  { :root { --grid-cols: 4; } }
  @media (min-width: 1200px) { :root { --grid-cols: 5; } }

  body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; overflow-x: hidden; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px;
  }
  .logo { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); }
  .logo span { color: var(--text); }

  /* LANG SWITCHER */
  .lang-switcher { display: flex; gap: 4px; }
  .lang-btn {
    padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 56px; z-index: 99;
  }
  .tab {
    flex: 1; padding: 14px 0; text-align: center;
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); cursor: pointer; border: none; background: none;
    transition: color 0.2s; position: relative;
  }
  .tab.active { color: var(--accent); }
  .tab.active::after {
    content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%;
    height: 2px; background: var(--accent); border-radius: 2px;
  }

  .view { display: none; padding: 0 0 100px; }
  .view.active { display: block; }

  .search-wrap { padding: 20px; max-width: 800px; margin: 0 auto; }
  .search-box { display: flex; gap: 8px; }
  .search-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; color: var(--text);
    font-family: var(--font-display); font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .search-btn {
    background: var(--accent); color: #000; border: none; border-radius: 10px;
    padding: 14px 22px; font-family: var(--font-display); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
  }
  .search-btn:active { opacity: 0.8; }

  .grid-wrap { padding: 0 20px; }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(var(--grid-cols), 1fr);
    gap: 14px;
  }
  .album-card {
    background: var(--surface); border-radius: 12px; overflow: hidden;
    cursor: pointer; border: 1px solid var(--border);
    transition: transform 0.15s, border-color 0.15s; position: relative;
  }
  .album-card:hover { transform: translateY(-2px); border-color: #444; }
  .album-card:active { transform: scale(0.97); }
  .album-card.rated { border-color: var(--accent); }
  .album-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: var(--surface2); }
  .album-info { padding: 10px 10px 12px; }
  .album-title { font-size: 12px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .album-artist { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rating-badge {
    position: absolute; top: 8px; right: 8px;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px; font-weight: 500; border: 1.5px solid;
  }

  .score-s { border-color: #e8ff47; color: #e8ff47; background: rgba(232,255,71,0.15); }
  .score-a { border-color: #47d4ff; color: #47d4ff; background: rgba(71,212,255,0.15); }
  .score-b { border-color: #47ff9c; color: #47ff9c; background: rgba(71,255,156,0.15); }
  .score-c { border-color: #ffaa47; color: #ffaa47; background: rgba(255,170,71,0.15); }
  .score-d { border-color: #ff6b47; color: #ff6b47; background: rgba(255,107,71,0.15); }
  .score-f { border-color: #ff4747; color: #ff4747; background: rgba(255,71,71,0.15); }
  .score-perfect { border-color: #fff; color: #fff; background: rgba(255,255,255,0.2); box-shadow: 0 0 8px rgba(232,255,71,0.6); }

  .home-hero { padding: 40px 20px 24px; max-width: 800px; margin: 0 auto; text-align: center; }
  .home-hero-title { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .home-hero-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .home-refresh {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; padding: 7px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: var(--font-display); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .home-refresh:hover { border-color: var(--accent); color: var(--accent); }
  .home-refresh.spinning svg { animation: spin 0.7s linear infinite; }

  .section-header { padding: 20px 20px 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  .ratings-list { padding: 0 20px; max-width: 800px; margin: 0 auto; }
  .rating-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .rating-row:last-child { border-bottom: none; }
  .rating-row-cover { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .rating-row-info { flex: 1; min-width: 0; }
  .rating-row-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rating-row-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rating-row-score { font-family: var(--font-mono); font-size: 22px; font-weight: 500; flex-shrink: 0; width: 44px; text-align: right; }

  .empty { text-align: center; padding: 60px 32px; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 100%; max-width: 560px; background: var(--surface);
    border-radius: 24px 24px 0 0; padding: 0 0 40px;
    max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 0; }
  .modal-close-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.2s; flex-shrink: 0;
  }
  .modal-cover-wrap { position: relative; }
  .modal-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; max-height: 280px; }
  .modal-cover-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 100px; background: linear-gradient(transparent, var(--surface)); }
  .modal-body { padding: 0 20px; }
  .modal-title { font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
  .modal-artist { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

  .score-display { text-align: center; margin-bottom: 8px; position: relative; }
  .score-number { font-family: var(--font-mono); font-size: 64px; font-weight: 500; line-height: 1; transition: color 0.3s; }
  .score-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; font-weight: 600; transition: color 0.3s; }
  .perfect-stars { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); font-size: 14px; letter-spacing: 4px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .perfect-stars.show { opacity: 1; }
  .perfect-glow { animation: perfectPulse 1.5s ease-in-out infinite; }
  @keyframes perfectPulse {
    0%,100% { text-shadow: 0 0 20px rgba(232,255,71,0.8), 0 0 40px rgba(232,255,71,0.4); }
    50% { text-shadow: 0 0 40px rgba(232,255,71,1), 0 0 80px rgba(232,255,71,0.6); }
  }

  .score-bar-wrap { padding: 0 0 16px; }
  .score-bar-track { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s; }

  .slider-wrap { margin: 16px 0 20px; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: var(--surface2); border-radius: 6px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 0 4px rgba(232,255,71,0.2); }
  .slider-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 6px; }

  .tracklist-wrap { margin-bottom: 20px; }
  .tracklist-section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .tracklist { background: var(--surface2); border-radius: 12px; overflow: hidden; }
  .track-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .track-row:last-child { border-bottom: none; }
  .track-num { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 18px; flex-shrink: 0; text-align: right; }
  .track-name { font-size: 13px; flex: 1; }
  .track-duration { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .tracklist-loading { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }

  .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; color: var(--text);
    font-family: var(--font-display); font-size: 14px; line-height: 1.6;
    outline: none; resize: none; height: 90px; transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .save-btn {
    width: 100%; padding: 16px; margin-top: 16px;
    background: var(--accent); color: #000; border: none; border-radius: 14px;
    font-family: var(--font-display); font-size: 15px; font-weight: 800;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .save-btn:active { transform: scale(0.98); }
  .delete-btn {
    width: 100%; padding: 14px; margin-top: 8px;
    background: transparent; color: #ff4747; border: 1px solid rgba(255,71,71,0.3);
    border-radius: 14px; font-family: var(--font-display); font-size: 14px; font-weight: 600;
    cursor: pointer;
  }

  .stats-inner { max-width: 800px; margin: 0 auto; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .stat-val { font-family: var(--font-mono); font-size: 28px; font-weight: 500; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .dist-wrap { padding: 0 20px 24px; }
  .dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; border-radius: 8px; padding: 4px; transition: background 0.15s; }
  .dist-row:hover { background: var(--surface2); }
  .dist-row.empty-band { cursor: default; opacity: 0.4; }
  .dist-row.empty-band:hover { background: transparent; }
  .dist-label { font-family: var(--font-mono); font-size: 12px; width: 50px; flex-shrink: 0; }
  .dist-bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .dist-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .dist-count { font-family: var(--font-mono); font-size: 12px; color: var(--muted); width: 20px; text-align: right; }

  .band-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    display: none; align-items: flex-end; justify-content: center;
  }
  .band-overlay.open { display: flex; }
  .band-modal {
    width: 100%; max-width: 560px; background: var(--surface);
    border-radius: 24px 24px 0 0; padding: 0 0 40px;
    max-height: 75vh; overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .band-modal-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 0; margin-bottom: 4px; }
  .band-modal-title { font-size: 14px; font-weight: 700; }
  .band-modal-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .spinner { display: flex; justify-content: center; padding: 40px; }
  .spin { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sort-wrap { display: flex; gap: 6px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
  .sort-wrap::-webkit-scrollbar { display: none; }
  .sort-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    font-family: var(--font-display); font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .sort-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">RATE<span>YOUR</span>ALBUMS</div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ko')">KO</button>
    <button class="lang-btn" onclick="setLang('pt')">PT</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-search" onclick="switchTab('search', this)"></button>
  <button class="tab" id="tab-ratings" onclick="switchTab('ratings', this)"></button>
  <button class="tab" id="tab-stats" onclick="switchTab('stats', this)"></button>
</div>

<div class="view active" id="view-search">
  <div class="search-wrap">
    <div class="search-box">
      <input class="search-input" id="searchInput" type="text" autocomplete="off">
      <button class="search-btn" id="searchBtnEl" onclick="doSearch()"></button>
    </div>
  </div>
  <div id="searchResults">
    <div class="home-hero">
      <div class="home-hero-title">✦ <span id="heroTitle"></span></div>
      <div class="home-hero-sub" id="heroSub"></div>
      <button class="home-refresh" id="refreshBtn" onclick="loadCuration()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span id="shuffleBtn"></span>
      </button>
    </div>
    <div class="section-header" id="curationLabel"></div>
    <div class="grid-wrap"><div class="results-grid" id="curationGrid"></div></div>
  </div>
</div>

<div class="view" id="view-ratings">
  <div class="sort-wrap">
    <button class="sort-btn active" id="sort-date" onclick="setSort('date', this)"></button>
    <button class="sort-btn" id="sort-score-desc" onclick="setSort('score-desc', this)"></button>
    <button class="sort-btn" id="sort-score-asc" onclick="setSort('score-asc', this)"></button>
    <button class="sort-btn" id="sort-alpha" onclick="setSort('alpha', this)"></button>
  </div>
  <div id="myRatingsList"></div>
</div>

<div class="view" id="view-stats">
  <div id="statsContent"></div>
</div>

<!-- RATING MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-top-bar">
      <div style="width:32px"></div>
      <div style="width:36px;height:4px;background:var(--border);border-radius:2px"></div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-cover-wrap" id="modalCoverWrap"></div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-artist" id="modalArtist"></div>
      <div class="score-display">
        <div class="perfect-stars" id="perfectStars">✦ ✦ ✦</div>
        <div class="score-number" id="scoreDisplay">50</div>
        <div class="score-label" id="gradeDisplay"></div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-track"><div class="score-bar-fill" id="scoreBarFill" style="width:50%"></div></div>
      </div>
      <div class="slider-wrap">
        <input type="range" id="scoreSlider" min="0" max="100" value="50" oninput="updateScore(this.value)">
        <div class="slider-labels"><span>0</span><span>50</span><span>100</span></div>
      </div>
      <div class="tracklist-wrap">
        <div class="tracklist-section-label" id="tracklistLabel"></div>
        <div class="tracklist" id="tracklistEl"><div class="tracklist-loading" id="tracklistLoading"></div></div>
      </div>
      <div class="field-label" id="commentLabel"></div>
      <textarea id="commentInput"></textarea>
      <button class="save-btn" id="saveBtnEl" onclick="saveRating()"></button>
      <button class="delete-btn" id="deleteBtn" style="display:none" onclick="deleteRating()"></button>
    </div>
  </div>
</div>

<!-- BAND POPUP -->
<div class="band-overlay" id="bandOverlay" onclick="closeBandOutside(event)">
  <div class="band-modal">
    <div class="band-modal-top">
      <div>
        <div class="band-modal-title" id="bandModalTitle"></div>
        <div class="band-modal-subtitle" id="bandModalSubtitle"></div>
      </div>
      <button class="modal-close-btn" onclick="closeBand()">✕</button>
    </div>
    <div id="bandList" style="padding:0 20px"></div>
  </div>
</div>

<script>
// ── TRANSLATIONS ──────────────────────────────────────────────────
const T = {
  en: {
    tabSearch: 'Search', tabRatings: 'My Ratings', tabStats: 'Stats',
    searchPlaceholder: 'Search albums or artists...', searchBtn: 'Search',
    heroTitle: "Today's Picks", heroSub: 'Discover something new every time',
    shuffleBtn: 'Shuffle', curationLoading: 'Loading...',
    sortDate: 'Recent', sortScoreDesc: 'Highest', sortScoreAsc: 'Lowest', sortAlpha: 'A–Z',
    ratingsCount: n => `${n} rating${n !== 1 ? 's' : ''}`,
    searchCount: n => `${n} result${n !== 1 ? 's' : ''}`,
    noResults: 'No results found',
    noRatings: "No ratings yet.\nSearch for albums to get started!",
    noStats: "No ratings yet.\nRate some albums to see your stats!",
    tracklist: 'Tracklist', noTracklist: 'No tracklist available',
    tracklistLoading: 'Loading...', comment: 'Comment',
    commentPlaceholder: 'What do you think of this album...',
    save: 'Save', delete: 'Delete',
    highest: 'Highest', lowest: 'Lowest',
    distHint: '— tap to see list',
    scoreLabels: {
      100: '✦ PERFECT ✦', 90: 'S — MASTERPIECE', 80: 'A — GREAT',
      70: 'B — GOOD', 60: 'C — DECENT', 50: 'D — MEDIOCRE', 0: 'F — BAD'
    },
    bandSubtitle: n => `${n} album${n !== 1 ? 's' : ''}`,
    searchError: 'Something went wrong. Try again.',

const LASTFM_KEY = 'e8c18f3eac290af9a7bda25d563df9f0';
const CURATION_SOURCES = [
  { method: 'chart.gettopalbums', label: '🔥 Trending Now', params: '' },
  { method: 'tag.gettopalbums', label: '🎸 Rock', params: '&tag=rock' },
  { method: 'tag.gettopalbums', label: '🎹 Jazz', params: '&tag=jazz' },
  { method: 'tag.gettopalbums', label: '💿 Hip-Hop', params: '&tag=hip-hop' },
  { method: 'tag.gettopalbums', label: '🌙 R&B', params: '&tag=rnb' },
  { method: 'tag.gettopalbums', label: '⚡ Electronic', params: '&tag=electronic' },
  { method: 'tag.gettopalbums', label: '🎻 Classical', params: '&tag=classical' },
  { method: 'tag.gettopalbums', label: '🌊 Indie', params: '&tag=indie' },
  { method: 'tag.gettopalbums', label: '🖤 Metal', params: '&tag=metal' },
  { method: 'tag.gettopalbums', label: '🎷 Soul', params: '&tag=soul' },
  { method: 'tag.gettopalbums', label: '🌿 Folk', params: '&tag=folk' },
  { method: 'tag.gettopalbums', label: '🎙️ K-Pop', params: '&tag=k-pop' },
];

function scoreGrade(n) {
  n = parseInt(n);
  const labels = T[lang].scoreLabels;
  if (n === 100) return { label: labels[100], cls: 'score-perfect', color: '#ffffff' };
  if (n >= 90)  return { label: labels[90],  cls: 'score-s', color: '#e8ff47' };
  if (n >= 80)  return { label: labels[80],  cls: 'score-a', color: '#47d4ff' };
  if (n >= 70)  return { label: labels[70],  cls: 'score-b', color: '#47ff9c' };
  if (n >= 60)  return { label: labels[60],  cls: 'score-c', color: '#ffaa47' };
  if (n >= 50)  return { label: labels[50],  cls: 'score-d', color: '#ff6b47' };
  return { label: labels[0], cls: 'score-f', color: '#ff4747' };
}

function saveRatings() { localStorage.setItem('ryaRatings', JSON.stringify(ratings)); }

function getBigCover(images) {
  if (!images) return null;
  for (const size of ['extralarge','large','medium','small']) {
    const img = images.find(i => i.size === size);
    if (img && img['#text'] && img['#text'] !== '') return img['#text'];
  }
  return null;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function dedupe(albums) {
  const seen = new Set();
  return albums.filter(a => {
    const artist = (a.artist?.name || a.artist || '').toLowerCase().trim();
    const name = (a.name || '').toLowerCase().trim();
    const key = `${artist}__${name}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

async function loadCuration() {
  const grid = document.getElementById('curationGrid');
  const label = document.getElementById('curationLabel');
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  grid.innerHTML = `<div style="grid-column:1/-1;display:flex;justify-content:center;padding:40px"><div class="spin"></div></div>`;
  const source = CURATION_SOURCES[Math.floor(Math.random() * CURATION_SOURCES.length)];
  label.textContent = source.label;
  try {
    const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=${source.method}&api_key=${LASTFM_KEY}&format=json&limit=50${source.params}`);
    const d = await r.json();
    let raw = d.albums?.album || d.topalbums?.album || [];
    if (!Array.isArray(raw)) raw = [raw];
    const albums = shuffle(dedupe(raw.filter(a => getBigCover(a.image)))).slice(0, 20);
    renderAlbumGrid(albums, grid);
  } catch(e) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="empty"><div class="empty-icon">⚠</div>${t('curationError')}</div>`;
  }
  btn.classList.remove('spinning');
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const container = document.getElementById('searchResults');
  container.innerHTML = '<div class="spinner"><div class="spin"></div></div>';
  try {
    const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=album.search&album=${encodeURIComponent(q)}&api_key=${LASTFM_KEY}&format=json&limit=50`);
    const d = await r.json();
    const raw = d.results?.albummatches?.album || [];
    const albums = dedupe(raw.filter(a => getBigCover(a.image)));
    if (!albums.length) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">◎</div>${t('noResults')}</div>`;
      return;
    }
    container.innerHTML = `<div class="section-header">${t('searchCount', albums.length)}</div><div class="grid-wrap"><div class="results-grid" id="searchGrid"></div></div>`;
    renderAlbumGrid(albums, document.getElementById('searchGrid'));
  } catch(e) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div>${t('searchError')}</div>`;
  }
}

function albumKey(album) {
  const artist = album.artist?.name || album.artist || '';
  return `${artist}__${album.name}`;
}

function renderAlbumGrid(albums, grid) {
  grid.innerHTML = albums.map(a => {
    const cover = getBigCover(a.image);
    const key = albumKey(a);
    const myRating = ratings[key];
    const badge = myRating ? `<div class="rating-badge ${scoreGrade(myRating.score).cls}">${myRating.score}</div>` : '';
    const safe = encodeURIComponent(JSON.stringify(a));
    return `<div class="album-card ${myRating?'rated':''}" onclick="openModalEncoded('${safe}')">
      <img class="album-cover" src="${cover}" alt="" loading="lazy">
      ${badge}
      <div class="album-info">
        <div class="album-title">${a.name}</div>
        <div class="album-artist">${a.artist?.name || a.artist || ''}</div>
      </div>
    </div>`;
  }).join('');
}

function openModalEncoded(enc) { openModal(JSON.parse(decodeURIComponent(enc))); }

async function openModal(album) {
  currentAlbum = album;
  const key = albumKey(album);
  const ex = ratings[key];
  const score = ex ? ex.score : 50;
  const cover = getBigCover(album.image);
  const artistName = album.artist?.name || album.artist || '';
  const coverWrap = document.getElementById('modalCoverWrap');
  coverWrap.innerHTML = cover
    ? `<img class="modal-cover" src="${cover}" alt=""><div class="modal-cover-gradient"></div>`
    : `<div style="height:20px"></div>`;
  document.getElementById('modalTitle').textContent = album.name;
  document.getElementById('modalArtist').textContent = artistName;
  document.getElementById('scoreSlider').value = score;
  document.getElementById('commentInput').value = ex?.comment || '';
  document.getElementById('commentInput').placeholder = t('commentPlaceholder');
  document.getElementById('deleteBtn').style.display = ex ? 'block' : 'none';
  document.getElementById('deleteBtn').textContent = t('delete');
  document.getElementById('saveBtnEl').textContent = t('save');
  document.getElementById('tracklistLabel').textContent = t('tracklist');
  updateScore(score);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  loadTracklist(artistName, album.name);
}

async function loadTracklist(artist, album) {
  const el = document.getElementById('tracklistEl');
  el.innerHTML = `<div class="tracklist-loading">${t('tracklistLoading')}</div>`;
  try {
    const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=album.getinfo&api_key=${LASTFM_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(album)}&format=json`);
    const d = await r.json();
    const tracks = d.album?.tracks?.track;
    if (!tracks || (Array.isArray(tracks) && tracks.length === 0)) {
      el.innerHTML = `<div class="tracklist-loading">${t('noTracklist')}</div>`;
      return;
    }
    const list = Array.isArray(tracks) ? tracks : [tracks];
    el.innerHTML = list.map((tr, i) => {
      const dur = tr.duration ? `${Math.floor(tr.duration/60)}:${String(tr.duration%60).padStart(2,'0')}` : '';
      return `<div class="track-row"><div class="track-num">${i+1}</div><div class="track-name">${tr.name}</div><div class="track-duration">${dur}</div></div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="tracklist-loading">${t('noTracklist')}</div>`;
  }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function updateScore(val) {
  val = parseInt(val);
  const g = scoreGrade(val);
  const scoreEl = document.getElementById('scoreDisplay');
  const starsEl = document.getElementById('perfectStars');
  scoreEl.textContent = val;
  scoreEl.style.color = g.color;
  document.getElementById('gradeDisplay').textContent = g.label;
  document.getElementById('gradeDisplay').style.color = g.color;
  document.getElementById('scoreBarFill').style.width = val + '%';
  if (val === 100) {
    document.getElementById('scoreBarFill').style.background = 'linear-gradient(90deg,#e8ff47,#fff)';
    scoreEl.classList.add('perfect-glow'); starsEl.classList.add('show');
  } else {
    document.getElementById('scoreBarFill').style.background = g.color;
    scoreEl.classList.remove('perfect-glow'); starsEl.classList.remove('show');
  }
}

function saveRating() {
  if (!currentAlbum) return;
  const key = albumKey(currentAlbum);
  const artistName = currentAlbum.artist?.name || currentAlbum.artist || '';
  ratings[key] = {
    score: parseInt(document.getElementById('scoreSlider').value),
    comment: document.getElementById('commentInput').value.trim(),
    album: { key, name: currentAlbum.name, artist: artistName, cover: getBigCover(currentAlbum.image) },
    savedAt: Date.now()
  };
  saveRatings(); closeModal(); renderMyRatings(); renderStats();
}

function deleteRating() {
  if (!currentAlbum) return;
  delete ratings[albumKey(currentAlbum)];
  saveRatings(); closeModal(); renderMyRatings(); renderStats();
}

function setSort(s, btn) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMyRatings();
}

function renderRatingRow(r) {
  const g = scoreGrade(r.score);
  const safe = encodeURIComponent(JSON.stringify({
    name: r.album.name, artist: r.album.artist,
    image: r.album.cover ? [{'#text':'','size':'small'},{'#text':'','size':'medium'},{'#text':'','size':'large'},{'#text':r.album.cover,'size':'extralarge'}] : []
  }));
  const coverHtml = r.album.cover
    ? `<img class="rating-row-cover" src="${r.album.cover}" alt="">`
    : `<div class="rating-row-cover" style="display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0.3">♪</div>`;
  return `<div class="rating-row" onclick="openModalEncoded('${safe}')">
    ${coverHtml}
    <div class="rating-row-info">
      <div class="rating-row-title">${r.album.name}</div>
      <div class="rating-row-artist">${r.album.artist}</div>
    </div>
    <div class="rating-row-score" style="color:${g.color}">${r.score}</div>
  </div>`;
}

function renderMyRatings() {
  const el = document.getElementById('myRatingsList');
  let items = Object.values(ratings);
  if (!items.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">♫</div>${t('noRatings').replace('\n','<br>')}</div>`;
    return;
  }
  if (currentSort === 'date') items.sort((a,b) => b.savedAt - a.savedAt);
  else if (currentSort === 'score-desc') items.sort((a,b) => b.score - a.score);
  else if (currentSort === 'score-asc') items.sort((a,b) => a.score - b.score);
  else items.sort((a,b) => a.album.name.localeCompare(b.album.name));
  el.innerHTML = `<div class="section-header">${t('ratingsCount', items.length)}</div><div class="ratings-list">${items.map(renderRatingRow).join('')}</div>`;
}

function openBand(idx) {
  if (!window.bands) return;
  const b = window.bands[idx];
  const items = Object.values(ratings).filter(b.filter).sort((a,c) => c.score - a.score);
  if (!items.length) return;
  document.getElementById('bandModalTitle').textContent = b.label;
  document.getElementById('bandModalTitle').style.color = b.color;
  document.getElementById('bandModalSubtitle').textContent = t('bandSubtitle', items.length);
  document.getElementById('bandList').innerHTML = items.map(renderRatingRow).join('');
  document.getElementById('bandOverlay').classList.add('open');
}
function closeBand() { document.getElementById('bandOverlay').classList.remove('open'); }
function closeBandOutside(e) { if (e.target === document.getElementById('bandOverlay')) closeBand(); }

function renderStats() {
  const el = document.getElementById('statsContent');
  const items = Object.values(ratings);
  if (!items.length) {
    el.innerHTML = `<div class="empty" style="padding-top:80px"><div class="empty-icon">◈</div>${t('noStats').replace('\n','<br>')}</div>`;
    return;
  }
  const avg = Math.round(items.reduce((s,r) => s+r.score, 0) / items.length);
  const best = items.reduce((a,b) => a.score > b.score ? a : b);
  const worst = items.reduce((a,b) => a.score < b.score ? a : b);
  const bands = [
    { label: '100',   color: '#ffffff', filter: r => r.score === 100 },
    { label: '90–99', color: '#e8ff47', filter: r => r.score >= 90 && r.score < 100 },
    { label: '80–89', color: '#47d4ff', filter: r => r.score >= 80 && r.score < 90 },
    { label: '70–79', color: '#47ff9c', filter: r => r.score >= 70 && r.score < 80 },
    { label: '60–69', color: '#ffaa47', filter: r => r.score >= 60 && r.score < 70 },
    { label: '50–59', color: '#ff6b47', filter: r => r.score >= 50 && r.score < 60 },
    { label: '0–49',  color: '#ff4747', filter: r => r.score < 50 },
  ];
  window.bands = bands;
  const counts = bands.map(b => items.filter(b.filter).length);
  const max = Math.max(...counts, 1);
  el.innerHTML = `<div class="stats-inner">
    <div class="section-header">${t('totalStats')}</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${items.length}</div><div class="stat-label">${t('totalRatings')}</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${scoreGrade(avg).color}">${avg}</div><div class="stat-label">${t('avgScore')}</div></div>
    </div>
    <div class="section-header">${t('bestWorst')}</div>
    <div style="padding:0 20px 20px;display:flex;flex-direction:column;gap:10px;max-width:800px;margin:0 auto">
      ${[['highest',best],['lowest',worst]].map(([lk,r]) => `
      <div style="display:flex;align-items:center;gap:14px;padding:14px;background:var(--surface);border-radius:14px;border:1px solid var(--border)">
        ${r.album.cover ? `<img style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0" src="${r.album.cover}" alt="">` : `<div style="width:56px;height:56px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0.3;flex-shrink:0">♪</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px">${t(lk)}</div>
          <div style="font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.album.name}</div>
          <div style="font-size:12px;color:var(--muted)">${r.album.artist}</div>
        </div>
        <div style="font-family:var(--font-mono);font-size:22px;color:${scoreGrade(r.score).color};flex-shrink:0">${r.score}</div>
      </div>`).join('')}
    </div>
    <div class="section-header">${t('distribution')} <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:var(--muted)">${t('distHint')}</span></div>
    <div class="dist-wrap">
      ${bands.map((b,i) => `
      <div class="dist-row ${counts[i]===0?'empty-band':''}" onclick="openBand(${i})">
        <div class="dist-label" style="color:${b.color}">${b.label}</div>
        <div class="dist-bar-track"><div class="dist-bar-fill" style="width:${counts[i]/max*100}%;background:${b.color}"></div></div>
        <div class="dist-count">${counts[i]}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  btn.classList.add('active');
  if (tab === 'ratings') renderMyRatings();
  if (tab === 'stats') renderStats();
}

      <div class="home-hero-sub" id="heroSub">${t('heroSub')}</div>
      <button class="home-refresh" id="refreshBtn" onclick="loadCuration()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span id="shuffleBtn">${t('shuffleBtn')}</span>
      </button>
    </div>
    <div class="section-header" id="curationLabel"></div>
    <div class="grid-wrap"><div class="results-grid" id="curationGrid"></div></div>`;
  loadCuration();
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('searchInput').addEventListener('input', e => { if (e.target.value === '') resetToHome(); });

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

// Init
applyTranslations();
document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
document.querySelector(`.lang-btn[onclick="setLang('en')"]`).classList.remove('active');
if (lang !== 'en') document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
loadCuration();
</script>
</body>
</html>
