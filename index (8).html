<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rate Your Albums">
<meta name="theme-color" content="#0a0a0a">
<title>Rate Your Albums</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><circle cx='16' cy='16' r='10' fill='none' stroke='%23e8ff47' stroke-width='2'/><circle cx='16' cy='16' r='3' fill='%23e8ff47'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
  --border: #2a2a2a; --text: #f0f0f0; --muted: #666;
  --accent: #e8ff47; --accent-dim: rgba(232,255,71,0.12);
  --font-display: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  --grid-cols: 2;
}
@media (min-width: 600px)  { :root { --grid-cols: 3; } }
@media (min-width: 900px)  { :root { --grid-cols: 5; } }

body { background: var(--bg); color: var(--text); font-family: var(--font-display); min-height: 100vh; overflow-x: hidden; }

/* AUTH */
.auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card { width: 100%; max-width: 440px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px 36px; }
.auth-logo { font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 4px; letter-spacing: -0.02em; }
.auth-logo span { color: var(--text); }
.auth-tagline { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
.auth-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface2); border-radius: 10px; padding: 4px; }
.auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 700; color: var(--muted); cursor: pointer; border: none; background: none; border-radius: 7px; transition: all 0.2s; }
.auth-tab.active { background: var(--accent); color: #000; }
.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
.auth-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-family: var(--font-display); font-size: 15px; outline: none; transition: border-color 0.2s; }
.auth-input:focus { border-color: var(--accent); }
.auth-btn { width: 100%; padding: 15px; margin-top: 8px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: var(--font-display); font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 52px; }
.auth-error { color: #ff4747; font-size: 13px; margin-top: 10px; text-align: center; min-height: 18px; }
.auth-spin { width: 20px; height: 20px; border: 2.5px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }

/* HEADER */
header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 10px; }
.logo { font-size: 14px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); white-space: nowrap; }
.logo span { color: var(--text); }
.header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.lang-switcher { display: flex; gap: 3px; }
.lang-btn { padding: 4px 7px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font-mono); font-size: 10px; cursor: pointer; transition: all 0.15s; }
.lang-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.user-chip { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font-display); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.user-chip:hover { border-color: var(--accent); color: var(--accent); }

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 56px; z-index: 99; }
.tab { flex: 1; padding: 13px 0; text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); cursor: pointer; border: none; background: none; transition: color 0.2s; position: relative; }
.tab.active { color: var(--accent); }
.tab.active::after { content: ''; position: absolute; bottom: -1px; left: 20%; right: 20%; height: 2px; background: var(--accent); border-radius: 2px; }

.view { display: none; padding: 0 0 100px; }
.view.active { display: block; }

/* SEARCH */
.search-wrap { padding: 16px; max-width: 900px; margin: 0 auto; }
.search-box { display: flex; gap: 8px; }
.search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; color: var(--text); font-family: var(--font-display); font-size: 15px; outline: none; transition: border-color 0.2s; }
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--accent); }
.search-btn { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 13px 18px; font-family: var(--font-display); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* HOME */
.home-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
.home-section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.refresh-btn { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font-display); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
.genre-section { margin-bottom: 24px; }
.genre-label { padding: 0 16px 8px; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

/* GRID */
.grid-wrap { padding: 0 16px; }
.results-grid { display: grid; grid-template-columns: repeat(var(--grid-cols), 1fr); gap: 10px; }

/* ONE-ROW SCROLL for home */
.scroll-row { display: flex; gap: 10px; padding: 0 16px; overflow-x: auto; scrollbar-width: none; }
.scroll-row::-webkit-scrollbar { display: none; }
.scroll-row .album-card { flex: 0 0 calc((100vw - 52px) / var(--grid-cols)); max-width: 220px; }
@media (min-width: 900px) { .scroll-row .album-card { flex: 0 0 calc((min(900px, 100vw) - 100px) / 5); } }

.album-card { background: var(--surface); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid var(--border); transition: transform 0.15s, border-color 0.15s; position: relative; }
.album-card:hover { transform: translateY(-2px); border-color: #444; }
.album-card:active { transform: scale(0.97); }
.album-card.rated { border-color: var(--accent); }
.album-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: var(--surface2); }
.album-info { padding: 8px 9px 10px; }
.album-title { font-size: 11px; font-weight: 700; line-height: 1.3; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.album-artist { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rating-badge { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; font-weight: 500; border: 1.5px solid; }

.score-s { border-color: #e8ff47; color: #e8ff47; background: rgba(232,255,71,0.15); }
.score-a { border-color: #47d4ff; color: #47d4ff; background: rgba(71,212,255,0.15); }
.score-b { border-color: #47ff9c; color: #47ff9c; background: rgba(71,255,156,0.15); }
.score-c { border-color: #ffaa47; color: #ffaa47; background: rgba(255,170,71,0.15); }
.score-d { border-color: #ff6b47; color: #ff6b47; background: rgba(255,107,71,0.15); }
.score-f { border-color: #ff4747; color: #ff4747; background: rgba(255,71,71,0.15); }
.score-perfect { border-color: #fff; color: #fff; background: rgba(255,255,255,0.2); box-shadow: 0 0 8px rgba(232,255,71,0.6); }

/* SKELETON */
.skeleton-row { display: flex; gap: 10px; padding: 0 16px; overflow: hidden; }
.skeleton-card { flex: 0 0 calc((100vw - 52px) / var(--grid-cols)); max-width: 220px; aspect-ratio: 1/1; background: var(--surface); border-radius: 10px; animation: shimmer 1.2s ease-in-out infinite; }
@media (min-width: 900px) { .skeleton-card { flex: 0 0 calc((min(900px,100vw)-100px)/5); } }
@keyframes shimmer { 0%,100%{opacity:0.3} 50%{opacity:0.6} }

/* MY VIEW */
.my-view-inner { max-width: 900px; margin: 0 auto; }
.stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px 16px 0; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 0.2s; }
.stat-card:hover { border-color: var(--accent); }
.stat-val { font-family: var(--font-mono); font-size: 26px; font-weight: 500; }
.stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.section-header { padding: 16px 16px 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.dist-wrap { padding: 0 16px 8px; }
.dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; cursor: pointer; border-radius: 8px; padding: 3px 4px; transition: background 0.15s; }
.dist-row:hover { background: var(--surface2); }
.dist-row.empty-band { cursor: default; opacity: 0.35; }
.dist-row.empty-band:hover { background: transparent; }
.dist-label { font-family: var(--font-mono); font-size: 11px; width: 48px; flex-shrink: 0; }
.dist-bar-track { flex: 1; height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.dist-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
.dist-count { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 20px; text-align: right; }
.sort-wrap { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; scrollbar-width: none; }
.sort-wrap::-webkit-scrollbar { display: none; }
.sort-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font-display); font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.sort-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* PEOPLE */
.people-wrap { max-width: 600px; margin: 0 auto; padding: 0 16px; }
.user-search-box { display: flex; gap: 8px; padding: 16px 0 12px; }
.user-search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: var(--font-display); font-size: 14px; outline: none; transition: border-color 0.2s; }
.user-search-input:focus { border-color: var(--accent); }
.user-search-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; color: var(--text); font-family: var(--font-display); font-size: 13px; font-weight: 600; cursor: pointer; }
.user-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
.user-row:hover { opacity: 0.8; }
.user-row:last-child { border-bottom: none; }
.user-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
.user-row-name { flex: 1; font-size: 14px; font-weight: 700; }
.user-row-meta { font-size: 12px; color: var(--muted); }

.empty { text-align: center; padding: 40px 32px; color: var(--muted); font-size: 14px; line-height: 1.7; }

/* OVERLAY base */
.overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet { width: 100%; max-width: 560px; background: var(--surface); border-radius: 24px 24px 0 0; padding: 0 0 40px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1); }
.sheet-lg { max-height: 88vh; }
@keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
.sheet-handle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 0; flex-shrink: 0; }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; }
.close-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

/* RATING MODAL */
.modal-cover-wrap { position: relative; }
.modal-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; max-height: 240px; }
.modal-cover-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(transparent, var(--surface)); }
.modal-body { padding: 0 20px; }
.modal-title { font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
.modal-artist { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
.score-display { text-align: center; margin-bottom: 8px; position: relative; }
.score-number { font-family: var(--font-mono); font-size: 64px; font-weight: 500; line-height: 1; transition: color 0.3s; }
.score-lbl { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px; font-weight: 600; transition: color 0.3s; }
.perfect-stars { position: absolute; top: -8px; left: 50%; transform: translateX(-50%); font-size: 14px; letter-spacing: 4px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.perfect-stars.show { opacity: 1; }
.perfect-glow { animation: pg 1.5s ease-in-out infinite; }
@keyframes pg { 0%,100%{text-shadow:0 0 20px rgba(232,255,71,0.8),0 0 40px rgba(232,255,71,0.4)} 50%{text-shadow:0 0 40px rgba(232,255,71,1),0 0 80px rgba(232,255,71,0.6)} }
.score-bar-wrap { padding: 0 0 14px; }
.score-bar-track { height: 4px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.4s; }
.slider-wrap { margin: 14px 0 18px; }
input[type=range] { -webkit-appearance: none; width: 100%; height: 6px; background: var(--surface2); border-radius: 6px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 0 4px rgba(232,255,71,0.2); }
.slider-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
.field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.tracklist-wrap { margin-bottom: 18px; }
.tracklist { background: var(--surface2); border-radius: 10px; overflow: hidden; }
.track-row { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border-bottom: 1px solid var(--border); }
.track-row:last-child { border-bottom: none; }
.track-num { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 16px; flex-shrink: 0; text-align: right; }
.track-name { font-size: 13px; flex: 1; }
.track-dur { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
.tracklist-msg { padding: 13px; text-align: center; color: var(--muted); font-size: 13px; }
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; color: var(--text); font-family: var(--font-display); font-size: 14px; line-height: 1.6; outline: none; resize: none; height: 86px; transition: border-color 0.2s; }
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--muted); }
.save-btn { width: 100%; padding: 15px; margin-top: 14px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: var(--font-display); font-size: 15px; font-weight: 800; cursor: pointer; }
.delete-btn { width: 100%; padding: 13px; margin-top: 8px; background: transparent; color: #ff4747; border: 1px solid rgba(255,71,71,0.3); border-radius: 12px; font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; }

/* MY RATING QUICK VIEW */
.quick-header { display: flex; gap: 14px; padding: 16px 20px; align-items: flex-start; }
.quick-cover { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
.quick-info { flex: 1; min-width: 0; }
.quick-title { font-size: 17px; font-weight: 800; line-height: 1.2; margin-bottom: 3px; }
.quick-artist { font-size: 13px; color: var(--muted); }
.quick-score { font-family: var(--font-mono); font-size: 36px; font-weight: 500; flex-shrink: 0; }
.quick-comment { margin: 0 20px 16px; font-size: 14px; color: var(--muted); line-height: 1.6; background: var(--surface2); border-radius: 10px; padding: 12px 14px; min-height: 44px; }
.quick-edit-btn { margin: 0 20px; width: calc(100% - 40px); padding: 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; }
.others-section { margin: 16px 20px 0; }
.others-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.other-rating-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.other-rating-row:last-child { border-bottom: none; }
.other-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
.other-info { flex: 1; min-width: 0; }
.other-username { font-size: 13px; font-weight: 700; }
.other-comment { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.other-score { font-family: var(--font-mono); font-size: 16px; font-weight: 500; flex-shrink: 0; }

/* PROFILE SHEET */
.profile-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; }
.profile-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--accent-dim); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
.profile-uname { font-size: 18px; font-weight: 800; }
.profile-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
.profile-stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 20px 16px; }
.profile-stat { background: var(--surface2); border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: background 0.15s; }
.profile-stat:hover { background: var(--border); }
.profile-stat-val { font-family: var(--font-mono); font-size: 20px; font-weight: 500; }
.profile-stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.follow-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: var(--font-display); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.follow-btn.following { background: var(--accent); color: #000; }

/* MY PROFILE EXTRAS */
.my-profile-actions { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
.profile-action-btn { width: 100%; padding: 13px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: var(--font-display); font-size: 14px; font-weight: 600; cursor: pointer; text-align: left; }
.profile-action-btn.danger { color: #ff4747; border-color: rgba(255,71,71,0.3); }

/* CHANGE PASSWORD */
.change-pw-form { padding: 0 20px; }
.change-pw-form .auth-field { margin-bottom: 12px; }
.change-pw-form .auth-input { background: var(--surface2); }

/* BAND POPUP */
.band-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; }
.band-overlay.open { display: flex; }

/* TOAST */
.toast-overlay { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.toast { background: var(--surface); border: 1px solid var(--accent); border-radius: 16px; padding: 16px 28px; font-size: 16px; font-weight: 700; color: var(--accent); opacity: 0; transform: scale(0.9); transition: all 0.25s cubic-bezier(0.4,0,0.2,1); text-align: center; max-width: 260px; }
.toast.show { opacity: 1; transform: scale(1); }

.spinner { display: flex; justify-content: center; padding: 32px; }
.spin { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

<script>
const SUPABASE_URL = 'https://tgyluvtbjbiiwpiznqxw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_-2mLJHXy2kLYYyOqfvRjrg_VZu1XbUu';
const LASTFM_KEY   = 'e8c18f3eac290af9a7bda25d563df9f0';

const GENRES = [
  { label: "Today's Picks", method: 'chart.gettopalbums', params: '' },
  { label: 'Pop',           method: 'tag.gettopalbums',   params: '&tag=pop' },
  { label: 'Hip-Hop / Rap', method: 'tag.gettopalbums',   params: '&tag=hip-hop' },
  { label: 'R&B',           method: 'tag.gettopalbums',   params: '&tag=rnb' },
  { label: 'Electronic',    method: 'tag.gettopalbums',   params: '&tag=electronic' },
  { label: 'Jazz',          method: 'tag.gettopalbums',   params: '&tag=jazz' },
  { label: 'Classical',     method: 'tag.gettopalbums',   params: '&tag=classical' },
  { label: 'Rock',          method: 'tag.gettopalbums',   params: '&tag=rock' },
  { label: 'K-Pop',         method: 'tag.gettopalbums',   params: '&tag=k-pop' },
  { label: 'Latin',         method: 'tag.gettopalbums',   params: '&tag=latin' },
  { label: 'Folk',          method: 'tag.gettopalbums',   params: '&tag=folk' },
];

let lang = localStorage.getItem('ryaLang') || 'en';
let currentUser = null;
let currentAlbum = null;
let currentSort = 'date';
let currentProfileUser = null;
let currentProfileRatings = [];
let authMode = 'login';
let myRatingsCache = {};
let followingCache = new Set();
let quickAlbum = null;

// DB
async function db(method, path, body) {
  const opts = { method, headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': method==='POST'?'return=representation':'' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, opts);
  if (!r.ok && r.status !== 204) { const e = await r.json().catch(()=>({})); throw new Error(e.message||r.statusText); }
  if (r.status === 204) return null;
  return r.json();
}
const dbGet = p => db('GET', p);
const dbPost = (p,b) => db('POST',p,b);
const dbPatch = (p,b) => db('PATCH',p,b);
const dbDelete = p => db('DELETE',p);

// AUTH
function switchAuthTab(mode, btn) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('authBtnText').textContent = mode==='login'?'Log In':'Sign Up';
  document.getElementById('authErr').textContent = '';
}

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function handleAuth() {
  const username = document.getElementById('authUser').value.trim();
  const password = document.getElementById('authPass').value;
  const errEl = document.getElementById('authErr');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
  if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; return; }
  setAuthLoading(true);
  try {
    const hash = await hashPassword(password);
    if (authMode === 'signup') {
      const existing = await dbGet(`profiles?username=eq.${encodeURIComponent(username)}&select=id`);
      if (existing.length > 0) { errEl.textContent = 'Username already taken.'; return; }
      const users = await dbPost('profiles', { username, password_hash: hash });
      currentUser = users[0];
    } else {
      const users = await dbGet(`profiles?username=eq.${encodeURIComponent(username)}&select=*`);
      if (!users.length) { errEl.textContent = 'User not found.'; return; }
      if (users[0].password_hash !== hash) { errEl.textContent = 'Wrong password.'; return; }
      currentUser = users[0];
    }
    localStorage.setItem('ryaUser', JSON.stringify({ id: currentUser.id, username: currentUser.username }));
    await loadMyRatings();
    await loadFollowing();
    startApp();
  } catch(e) { errEl.textContent = e.message || 'Something went wrong.'; }
  finally { setAuthLoading(false); }
}

function setAuthLoading(on) {
  document.getElementById('authSpin').style.display = on ? 'block' : 'none';
  document.getElementById('authBtnText').style.display = on ? 'none' : 'block';
  document.getElementById('authBtn').disabled = on;
}

function confirmLogout() {
  closeOverlay('myProfileOverlay');
  setTimeout(() => {
    if (confirm('Are you sure you want to log out?')) logout();
  }, 200);
}

function logout() {
  localStorage.removeItem('ryaUser');
  currentUser = null; myRatingsCache = {}; followingCache = new Set();
  document.getElementById('app').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('authUser').value = '';
  document.getElementById('authPass').value = '';
  document.getElementById('authErr').textContent = '';
}

function startApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userChip').textContent = currentUser.username;
  setLang(lang);
  loadHome();
  renderMyView();
  renderFollowingList();
}

// LANG
function setLang(l) {
  lang = l;
  localStorage.setItem('ryaLang', l);
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  const lb = document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`);
  if (lb) lb.classList.add('active');
}

// HELPERS
function getBigCover(images) {
  if (!images) return null;
  for (const size of ['extralarge','large','medium','small']) {
    const img = images.find(i=>i.size===size);
    if (img && img['#text'] && img['#text']!=='') return img['#text'];
  }
  return null;
}
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function normalizeStr(s) { return (s||'').toLowerCase().replace(/[\s\/\-_.,!?'"()]/g,''); }
function dedupe(albums) {
  const seen=new Set();
  return albums.filter(a=>{
    const k=`${normalizeStr(a.artist?.name||a.artist||'')}__${normalizeStr(a.name||'')}`;
    if(seen.has(k))return false; seen.add(k); return true;
  });
}
function albumKey(a) { return `${a.artist?.name||a.artist||''}__${a.name}`; }
function scoreGrade(n) {
  n=parseInt(n);
  if(n===100)return{label:'PERFECT',cls:'score-perfect',color:'#ffffff'};
  if(n>=90)return{label:'S - MASTERPIECE',cls:'score-s',color:'#e8ff47'};
  if(n>=80)return{label:'A - GREAT',cls:'score-a',color:'#47d4ff'};
  if(n>=70)return{label:'B - GOOD',cls:'score-b',color:'#47ff9c'};
  if(n>=60)return{label:'C - DECENT',cls:'score-c',color:'#ffaa47'};
  if(n>=50)return{label:'D - MEDIOCRE',cls:'score-d',color:'#ff6b47'};
  return{label:'F - BAD',cls:'score-f',color:'#ff4747'};
}

function albumCardHtml(a, fromCache=false, clickFn='openModalEncoded') {
  const cover  = fromCache ? a.album_cover  : getBigCover(a.image);
  const name   = fromCache ? a.album_name   : a.name;
  const artist = fromCache ? a.album_artist : (a.artist?.name||a.artist||'');
  const key    = fromCache ? a.album_key    : albumKey(a);
  const myR    = myRatingsCache[key];
  const badge  = myR ? `<div class="rating-badge ${scoreGrade(myR.score).cls}">${myR.score}</div>` : '';
  const fakeAlbum = fromCache
    ? { name, artist, image:[{'#text':cover||'','size':'extralarge'}] }
    : a;
  const safe = encodeURIComponent(JSON.stringify(fakeAlbum));
  const fn = fromCache && myR ? `openQuickView('${safe}')` : `openModalEncoded('${safe}')`;
  return `<div class="album-card ${myR?'rated':''}" onclick="${fn}">
    <img class="album-cover" src="${cover||''}" alt="" loading="lazy">
    ${badge}
    <div class="album-info">
      <div class="album-title">${name}</div>
      <div class="album-artist">${artist}</div>
    </div>
  </div>`;
}

// HOME
async function loadHome() {
  const container = document.getElementById('searchResults');
  // render skeleton first
  container.innerHTML = `
    <div class="home-header">
      <span class="home-section-label">Discover</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadHome()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
    ${GENRES.map((g,i) => `
      <div class="genre-section" id="gs-${i}">
        <div class="genre-label">${g.label}</div>
        <div class="skeleton-row">${Array(5).fill('<div class="skeleton-card"></div>').join('')}</div>
      </div>`).join('')}`;

  // fetch all in parallel
  GENRES.forEach(async (g, i) => {
    try {
      const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=${g.method}&api_key=${LASTFM_KEY}&format=json&limit=50${g.params}`);
      const d = await r.json();
      let raw = d.albums?.album || d.topalbums?.album || [];
      if (!Array.isArray(raw)) raw = [raw];
      const albums = shuffle(dedupe(raw.filter(a=>getBigCover(a.image)))).slice(0,10);
      const sec = document.getElementById(`gs-${i}`);
      if (!sec) return;
      sec.innerHTML = `<div class="genre-label">${g.label}</div>
        <div class="scroll-row">${albums.map(a=>albumCardHtml(a,false)).join('')}</div>`;
    } catch { const sec=document.getElementById(`gs-${i}`); if(sec) sec.innerHTML=''; }
  });
}

// SEARCH
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { loadHome(); return; }
  const container = document.getElementById('searchResults');
  container.innerHTML = '<div class="spinner"><div class="spin"></div></div>';
  try {
    const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=album.search&album=${encodeURIComponent(q)}&api_key=${LASTFM_KEY}&format=json&limit=50`);
    const d = await r.json();
    const albums = dedupe((d.results?.albummatches?.album||[]).filter(a=>getBigCover(a.image)));
    if (!albums.length) { container.innerHTML=`<div class="empty">No results found.</div>`; return; }
    container.innerHTML=`<div class="home-section-label" style="padding:14px 16px 10px">${albums.length} results</div><div class="grid-wrap"><div class="results-grid">${albums.map(a=>albumCardHtml(a,false)).join('')}</div></div>`;
  } catch { container.innerHTML=`<div class="empty">Error. Try again.</div>`; }
}

// DB RATINGS
async function loadMyRatings() {
  if (!currentUser) return;
  myRatingsCache = {};
  const rows = await dbGet(`ratings?user_id=eq.${currentUser.id}&select=*`);
  rows.forEach(r => { myRatingsCache[r.album_key] = r; });
}

// MY VIEW
function renderMyView() { renderMyStats(); renderMyGrid(); }

function renderMyStats() {
  const el = document.getElementById('myStatsBlock');
  const items = Object.values(myRatingsCache);
  if (!items.length) { el.innerHTML=''; return; }
  const avg = Math.round(items.reduce((s,r)=>s+r.score,0)/items.length);
  const bands = [
    {label:'100',   color:'#ffffff',filter:r=>r.score===100},
    {label:'90-99', color:'#e8ff47',filter:r=>r.score>=90&&r.score<100},
    {label:'80-89', color:'#47d4ff',filter:r=>r.score>=80&&r.score<90},
    {label:'70-79', color:'#47ff9c',filter:r=>r.score>=70&&r.score<80},
    {label:'60-69', color:'#ffaa47',filter:r=>r.score>=60&&r.score<70},
    {label:'50-59', color:'#ff6b47',filter:r=>r.score>=50&&r.score<60},
    {label:'0-49',  color:'#ff4747',filter:r=>r.score<50},
  ];
  window.bands = bands;
  const counts = bands.map(b=>items.filter(b.filter).length);
  const max = Math.max(...counts,1);
  el.innerHTML=`
    <div class="stats-summary">
      <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${items.length}</div><div class="stat-label">Albums Rated</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${scoreGrade(avg).color}">${avg}</div><div class="stat-label">Avg Score</div></div>
    </div>
    <div class="section-header">Score Distribution <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px;color:var(--muted)">— tap to see list</span></div>
    <div class="dist-wrap">
      ${bands.map((b,i)=>`
      <div class="dist-row ${counts[i]===0?'empty-band':''}" onclick="openBand(${i})">
        <div class="dist-label" style="color:${b.color}">${b.label}</div>
        <div class="dist-bar-track"><div class="dist-bar-fill" style="width:${counts[i]/max*100}%;background:${b.color}"></div></div>
        <div class="dist-count">${counts[i]}</div>
      </div>`).join('')}
    </div>`;
}

function renderMyGrid() {
  const el = document.getElementById('myGrid');
  let items = Object.values(myRatingsCache);
  if (!items.length) { el.innerHTML=`<div class="empty" style="grid-column:1/-1">No ratings yet.<br>Search for albums to get started!</div>`; return; }
  if (currentSort==='date') items.sort((a,b)=>b.saved_at-a.saved_at);
  else if (currentSort==='score-desc') items.sort((a,b)=>b.score-a.score);
  else if (currentSort==='score-asc') items.sort((a,b)=>a.score-b.score);
  else items.sort((a,b)=>a.album_name.localeCompare(b.album_name));
  el.innerHTML = items.map(r=>albumCardHtml(r,true)).join('');
}

function setSort(s, btn) {
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMyGrid();
}

// QUICK VIEW (my rated albums)
function openQuickView(enc) {
  const album = JSON.parse(decodeURIComponent(enc));
  quickAlbum = album;
  const key = albumKey(album);
  const r = myRatingsCache[key];
  if (!r) { openModalEncoded(enc); return; }
  const g = scoreGrade(r.score);
  document.getElementById('quickCover').src = getBigCover(album.image) || '';
  document.getElementById('quickTitle').textContent = album.name;
  document.getElementById('quickArtist').textContent = album.artist?.name||album.artist||'';
  document.getElementById('quickScore').textContent = r.score;
  document.getElementById('quickScore').style.color = g.color;
  document.getElementById('quickComment').textContent = r.comment || 'No comment.';
  document.getElementById('quickComment').style.color = r.comment ? 'var(--text)' : 'var(--muted)';
  document.getElementById('otherRatings').innerHTML = '<div class="spinner"><div class="spin"></div></div>';
  openOverlay('quickOverlay');
  // load others' ratings
  loadOtherRatings(key);
}

async function loadOtherRatings(key) {
  const el = document.getElementById('otherRatings');
  try {
    const rows = await dbGet(`ratings?album_key=eq.${encodeURIComponent(key)}&user_id=neq.${currentUser.id}&select=*,profiles(username)`);
    if (!rows.length) { el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0">No other ratings yet.</div>'; return; }
    el.innerHTML = rows.map(r => {
      const g = scoreGrade(r.score);
      const uname = r.profiles?.username || '?';
      return `<div class="other-rating-row">
        <div class="other-avatar">${uname[0].toUpperCase()}</div>
        <div class="other-info">
          <div class="other-username">@${uname}</div>
          ${r.comment ? `<div class="other-comment">${r.comment}</div>` : ''}
        </div>
        <div class="other-score" style="color:${g.color}">${r.score}</div>
      </div>`;
    }).join('');
  } catch { el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0">Could not load.</div>'; }
}

function openEditFromQuick() {
  closeOverlay('quickOverlay');
  setTimeout(() => { if (quickAlbum) openModal(quickAlbum); }, 200);
}

// FULL RATING MODAL
function openModalEncoded(enc) { openModal(JSON.parse(decodeURIComponent(enc))); }

async function openModal(album) {
  currentAlbum = album;
  const key = albumKey(album);
  const ex = myRatingsCache[key];
  const score = ex ? ex.score : 50;
  const cover = getBigCover(album.image);
  const artist = album.artist?.name||album.artist||'';
  document.getElementById('modalCoverWrap').innerHTML = cover
    ? `<img class="modal-cover" src="${cover}" alt=""><div class="modal-cover-gradient"></div>`
    : `<div style="height:16px"></div>`;
  document.getElementById('modalTitle').textContent = album.name;
  document.getElementById('modalArtist').textContent = artist;
  document.getElementById('scoreSlider').value = score;
  document.getElementById('commentInput').value = ex?.comment||'';
  document.getElementById('deleteBtnEl').style.display = ex?'block':'none';
  updateScore(score);
  openOverlay('ratingOverlay');
  loadTracklist(artist, album.name);
}

async function loadTracklist(artist, album) {
  const el = document.getElementById('tracklistEl');
  el.innerHTML=`<div class="tracklist-msg">Loading...</div>`;
  try {
    const r=await fetch(`https://ws.audioscrobbler.com/2.0/?method=album.getinfo&api_key=${LASTFM_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(album)}&format=json`);
    const d=await r.json();
    const tracks=d.album?.tracks?.track;
    if(!tracks||(Array.isArray(tracks)&&!tracks.length)){el.innerHTML=`<div class="tracklist-msg">No tracklist available.</div>`;return;}
    const list=Array.isArray(tracks)?tracks:[tracks];
    el.innerHTML=list.map((tr,i)=>{
      const dur=tr.duration?`${Math.floor(tr.duration/60)}:${String(tr.duration%60).padStart(2,'0')}`:'';
      return `<div class="track-row"><div class="track-num">${i+1}</div><div class="track-name">${tr.name}</div><div class="track-dur">${dur}</div></div>`;
    }).join('');
  } catch { el.innerHTML=`<div class="tracklist-msg">No tracklist available.</div>`; }
}

function updateScore(val) {
  val=parseInt(val); const g=scoreGrade(val);
  const sn=document.getElementById('scoreNum'), st=document.getElementById('perfectStars');
  sn.textContent=val; sn.style.color=g.color;
  document.getElementById('scoreLbl').textContent=g.label;
  document.getElementById('scoreLbl').style.color=g.color;
  document.getElementById('scoreBar').style.width=val+'%';
  if(val===100){
    document.getElementById('scoreBar').style.background='linear-gradient(90deg,#e8ff47,#fff)';
    sn.classList.add('perfect-glow'); st.classList.add('show');
  } else {
    document.getElementById('scoreBar').style.background=g.color;
    sn.classList.remove('perfect-glow'); st.classList.remove('show');
  }
}

async function saveRating() {
  if(!currentAlbum||!currentUser) return;
  const key=albumKey(currentAlbum);
  const artist=currentAlbum.artist?.name||currentAlbum.artist||'';
  const score = parseInt(document.getElementById('scoreSlider').value);
  const payload={
    user_id:currentUser.id, album_key:key,
    album_name:currentAlbum.name, album_artist:artist,
    album_cover:getBigCover(currentAlbum.image)||'',
    score, comment:document.getElementById('commentInput').value.trim(),
    saved_at:Date.now()
  };
  try {
    const ex=myRatingsCache[key];
    if(ex){await dbPatch(`ratings?id=eq.${ex.id}`,payload);myRatingsCache[key]={...ex,...payload};}
    else{const rows=await dbPost('ratings',payload);myRatingsCache[key]=rows[0];}
    closeOverlay('ratingOverlay');
    showToast(`Saved  ${score}`);
    renderMyView();
  } catch(e){alert(e.message);}
}

async function deleteRating() {
  if(!currentAlbum||!currentUser)return;
  const key=albumKey(currentAlbum);const ex=myRatingsCache[key];if(!ex)return;
  try{
    await dbDelete(`ratings?id=eq.${ex.id}`);
    delete myRatingsCache[key];
    closeOverlay('ratingOverlay');
    showToast('Deleted');
    renderMyView();
  }catch(e){alert(e.message);}
}

// BAND
function openBand(idx) {
  if(!window.bands)return;
  const b=window.bands[idx];
  const items=Object.values(myRatingsCache).filter(b.filter).sort((a,c)=>c.score-a.score);
  if(!items.length)return;
  document.getElementById('bandTitle').textContent=b.label;
  document.getElementById('bandTitle').style.color=b.color;
  document.getElementById('bandSub').textContent=`${items.length} album${items.length!==1?'s':''}`;
  document.getElementById('bandGrid').innerHTML=items.map(r=>albumCardHtml(r,true)).join('');
  document.getElementById('bandOverlay').classList.add('open');
}
function closeBand(){document.getElementById('bandOverlay').classList.remove('open');}
function closeBandOutside(e){if(e.target===document.getElementById('bandOverlay'))closeBand();}

// MY PROFILE
async function openMyProfile() {
  const items = Object.values(myRatingsCache);
  const commentCount = items.filter(r=>r.comment&&r.comment.trim()).length;
  document.getElementById('myAvatar').textContent = currentUser.username[0].toUpperCase();
  document.getElementById('myUname').textContent = '@' + currentUser.username;
  document.getElementById('myMeta').textContent = `Member since ${new Date(currentUser.created_at||Date.now()).getFullYear()}`;
  document.getElementById('myRatingCount').textContent = items.length;
  document.getElementById('myCommentCount').textContent = commentCount;
  document.getElementById('myFollowerCount').textContent = '...';
  // recent 10
  const recent = [...items].sort((a,b)=>b.saved_at-a.saved_at).slice(0,10);
  document.getElementById('myRecentGrid').innerHTML = recent.map(r=>albumCardHtml(r,true)).join('');
  openOverlay('myProfileOverlay');
  // load follower count
  const followers = await dbGet(`follows?following_id=eq.${currentUser.id}&select=follower_id`);
  document.getElementById('myFollowerCount').textContent = followers.length;
}

function goToMyRatings() { closeOverlay('myProfileOverlay'); switchTab('my', document.getElementById('tab-my')); }
function goToMyComments() {
  closeOverlay('myProfileOverlay');
  switchTab('my', document.getElementById('tab-my'));
  // scroll to comments section - just show rated albums with comments
}
async function showMyFollowers() {
  const followers = await dbGet(`follows?following_id=eq.${currentUser.id}&select=follower_id,profiles(username)`);
  document.getElementById('followersTitle').textContent = 'Followers';
  document.getElementById('followersList').innerHTML = followers.length
    ? followers.map(f=>`<div class="user-row" onclick="closeOverlay('followersOverlay');openProfile('${f.follower_id}','${f.profiles?.username||''}')"><div class="user-avatar">${(f.profiles?.username||'?')[0].toUpperCase()}</div><div class="user-row-name">@${f.profiles?.username||'?'}</div></div>`).join('')
    : '<div style="padding:12px 0;color:var(--muted);font-size:13px">No followers yet.</div>';
  openOverlay('followersOverlay');
}

// CHANGE PASSWORD
function showChangePw() {
  ['pwCurrent','pwNew','pwConfirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pwError').textContent='';
  openOverlay('changePwOverlay');
}
async function changePassword() {
  const cur=document.getElementById('pwCurrent').value;
  const nw=document.getElementById('pwNew').value;
  const cf=document.getElementById('pwConfirm').value;
  const errEl=document.getElementById('pwError');
  errEl.textContent='';
  if(!cur||!nw||!cf){errEl.textContent='Fill all fields.';return;}
  if(nw.length<6){errEl.textContent='New password must be at least 6 characters.';return;}
  if(nw!==cf){errEl.textContent='Passwords do not match.';return;}
  const curHash=await hashPassword(cur);
  const users=await dbGet(`profiles?id=eq.${currentUser.id}&select=password_hash`);
  if(!users.length||users[0].password_hash!==curHash){errEl.textContent='Current password is wrong.';return;}
  const newHash=await hashPassword(nw);
  await dbPatch(`profiles?id=eq.${currentUser.id}`,{password_hash:newHash});
  closeOverlay('changePwOverlay');
  showToast('Password updated!');
}

// PEOPLE
async function loadFollowing() {
  if(!currentUser)return;
  const rows=await dbGet(`follows?follower_id=eq.${currentUser.id}&select=following_id`);
  followingCache=new Set(rows.map(r=>r.following_id));
}
async function renderFollowingList() {
  const el=document.getElementById('followingList');
  if(!followingCache.size){el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0">Not following anyone yet.</div>';return;}
  const ids=[...followingCache].map(id=>`id=eq.${id}`).join(',');
  const users=await dbGet(`profiles?or=(${ids})&select=id,username`);
  el.innerHTML=users.map(u=>`<div class="user-row" onclick="openProfile('${u.id}','${u.username}')"><div class="user-avatar">${u.username[0].toUpperCase()}</div><div class="user-row-name">@${u.username}</div></div>`).join('');
}
async function searchUsers() {
  const q=document.getElementById('userSearchInput').value.trim();if(!q)return;
  const el=document.getElementById('userSearchResults');
  const users=await dbGet(`profiles?username=ilike.*${encodeURIComponent(q)}*&select=id,username&limit=10`);
  const filtered=users.filter(u=>u.id!==currentUser.id);
  if(!filtered.length){el.innerHTML='<div style="padding:8px 0;color:var(--muted);font-size:13px">User not found.</div>';return;}
  el.innerHTML=filtered.map(u=>`<div class="user-row" onclick="openProfile('${u.id}','${u.username}')"><div class="user-avatar">${u.username[0].toUpperCase()}</div><div class="user-row-name">@${u.username}</div><div class="user-row-meta">${followingCache.has(u.id)?'Following':''}</div></div>`).join('');
}

// OTHER PROFILE
let currentProfileTab = 'ratings';
async function openProfile(userId, username) {
  if(!userId||!username)return;
  currentProfileUser={id:userId,username};
  currentProfileRatings=[];
  currentProfileTab='ratings';
  document.getElementById('profileAvatar').textContent=username[0].toUpperCase();
  document.getElementById('profileUname').textContent='@'+username;
  document.getElementById('profileMeta').textContent='Loading...';
  document.getElementById('pRatingCount').textContent='...';
  document.getElementById('pCommentCount').textContent='...';
  document.getElementById('pFollowerCount').textContent='...';
  document.getElementById('profileContent').innerHTML='<div class="spinner"><div class="spin"></div></div>';
  const isFollowing=followingCache.has(userId);
  const fb=document.getElementById('followBtn');
  fb.textContent=isFollowing?'Unfollow':'Follow';
  fb.className='follow-btn'+(isFollowing?' following':'');
  openOverlay('profileOverlay');
  const [ratings,followers,following]=await Promise.all([
    dbGet(`ratings?user_id=eq.${userId}&select=*&order=saved_at.desc`),
    dbGet(`follows?following_id=eq.${userId}&select=follower_id`),
    dbGet(`follows?follower_id=eq.${userId}&select=following_id`)
  ]);
  currentProfileRatings=ratings;
  const commentCount=ratings.filter(r=>r.comment&&r.comment.trim()).length;
  document.getElementById('profileMeta').textContent=`${followers.length} followers · ${following.length} following`;
  document.getElementById('pRatingCount').textContent=ratings.length;
  document.getElementById('pCommentCount').textContent=commentCount;
  document.getElementById('pFollowerCount').textContent=followers.length;
  showProfileTab('ratings');
}

function showProfileTab(tab) {
  currentProfileTab=tab;
  const el=document.getElementById('profileContent');
  const label=document.getElementById('profileTabLabel');
  if(tab==='ratings'){
    label.textContent='Ratings';
    el.innerHTML=currentProfileRatings.length
      ?`<div class="results-grid">${currentProfileRatings.map(r=>albumCardHtml(r,true)).join('')}</div>`
      :'<div style="color:var(--muted);font-size:13px;padding:8px 0">No ratings yet.</div>';
  } else if(tab==='comments'){
    label.textContent='Comments';
    const withComments=currentProfileRatings.filter(r=>r.comment&&r.comment.trim());
    el.innerHTML=withComments.length
      ?withComments.map(r=>{
        const g=scoreGrade(r.score);
        return `<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          ${r.album_cover?`<img style="width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0" src="${r.album_cover}" alt="">`:
          `<div style="width:44px;height:44px;border-radius:6px;background:var(--surface2);flex-shrink:0"></div>`}
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.album_name}</div>
            <div style="font-size:12px;color:var(--muted)">${r.comment}</div>
          </div>
          <div style="font-family:var(--font-mono);font-size:16px;color:${g.color};flex-shrink:0">${r.score}</div>
        </div>`;}).join('')
      :'<div style="color:var(--muted);font-size:13px;padding:8px 0">No comments yet.</div>';
  } else if(tab==='followers'){
    label.textContent='Followers';
    el.innerHTML='<div class="spinner"><div class="spin"></div></div>';
    dbGet(`follows?following_id=eq.${currentProfileUser.id}&select=follower_id,profiles(username,id)`)
      .then(rows=>{
        el.innerHTML=rows.length
          ?rows.map(f=>`<div class="user-row" onclick="openProfile('${f.profiles?.id}','${f.profiles?.username||''}')"><div class="user-avatar">${(f.profiles?.username||'?')[0].toUpperCase()}</div><div class="user-row-name">@${f.profiles?.username||'?'}</div></div>`).join('')
          :'<div style="color:var(--muted);font-size:13px;padding:8px 0">No followers yet.</div>';
      });
  }
}

async function toggleFollow() {
  if(!currentProfileUser||!currentUser)return;
  const uid=currentProfileUser.id;const fb=document.getElementById('followBtn');
  if(followingCache.has(uid)){
    await dbDelete(`follows?follower_id=eq.${currentUser.id}&following_id=eq.${uid}`);
    followingCache.delete(uid);fb.textContent='Follow';fb.className='follow-btn';
  } else {
    await dbPost('follows',{follower_id:currentUser.id,following_id:uid});
    followingCache.add(uid);fb.textContent='Unfollow';fb.className='follow-btn following';
  }
  renderFollowingList();
}

// OVERLAY HELPERS
function openOverlay(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function closeOverlayOutside(e, id) { if(e.target===document.getElementById(id)) closeOverlay(id); }

// TABS
function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='my') renderMyView();
  if(tab==='people') renderFollowingList();
}

// TOAST
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// EVENTS
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
document.getElementById('searchInput').addEventListener('input',e=>{if(!e.target.value)loadHome();});
document.getElementById('userSearchInput').addEventListener('keydown',e=>{if(e.key==='Enter')searchUsers();});
document.getElementById('authUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('authPass').focus();});
document.getElementById('authPass').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// INIT
(async()=>{
  const saved=localStorage.getItem('ryaUser');
  if(saved){
    currentUser=JSON.parse(saved);
    await loadMyRatings();
    await loadFollowing();
    startApp();
  } else {
    document.getElementById('authScreen').style.display='flex';
  }
})();
</script>
